name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Blocking gate: the library must build (Vite bundle + type declarations).
      - name: Build library
        run: pnpm run build:lib

      # Non-blocking for now: flip to a gate (drop continue-on-error) once every
      # in-flight branch has picked up this cleanup and lint stays at zero.
      - name: Lint
        run: pnpm run lint
        continue-on-error: true
