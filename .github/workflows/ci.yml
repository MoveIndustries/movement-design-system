name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Blocking gate: the library must build (Vite bundle + type declarations).
      - name: Build library
        run: pnpm run build:lib

      # Non-blocking for now: flip to a gate (drop continue-on-error) once every
      # in-flight branch has picked up this cleanup and lint stays at zero.
      - name: Lint
        run: pnpm run lint
        continue-on-error: true
